name: CI

on:
  pull_request:
  push:
    branches:
    - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "3"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-python@v7
    - uses: pre-commit/action@v3.0.1

  tests:
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      # Minimum and maximum stable Python on all OS's, other versions on Linux.
      matrix:
        runs-on: [ubuntu-latest, macos-15-intel, windows-2022, windows-latest]
        python: ["3.10", "3.14"]
        include:
        - { runs-on: ubuntu-latest, python: "3.11" }
        - { runs-on: ubuntu-latest, python: "3.13" }
        - { runs-on: ubuntu-latest, python: "3.15" }

    name: Tests on 🐍 ${{ matrix.python }} • ${{ matrix.runs-on }}
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - uses: astral-sh/setup-uv@v8.3.2

    - name: Set environment for Fortran compiler on MacOS
      if: runner.os == 'macOS'
      run: |
        brew reinstall gfortran
        echo "FC=gfortran" >> $GITHUB_ENV

    - name: Setup nox
      uses: wntrblm/nox@2026.07.11
      with:
        python-versions: "${{ matrix.python }}"

    - name: Test on 🐍 ${{ matrix.python }}
      env:
        # Get numpy nightlies until it publishes 3.15 wheels; PIP_* covers pip's
        # isolated build envs (pep518 tests), UV_* the nox env install.
        PIP_EXTRA_INDEX_URL: ${{ matrix.python == '3.15' && 'https://pypi.anaconda.org/scientific-python-nightly-wheels/simple' || '' }}
        PIP_PRE: ${{ matrix.python == '3.15' && '1' || '0' }}
        UV_EXTRA_INDEX_URL: ${{ matrix.python == '3.15' && 'https://pypi.anaconda.org/scientific-python-nightly-wheels/simple' || '' }}
        UV_PRERELEASE: ${{ matrix.python == '3.15' && 'allow' || 'if-necessary-or-explicit' }}
      run: nox -s tests-${{ matrix.python }} -- --cov --cov-report=xml --cov-report=term --durations=20

    - name: Upload coverage report
      uses: codecov/codecov-action@v7
      with:
        name: ${{ matrix.runs-on }}-${{ matrix.python }}
        verbose: true


  cygwin:
    name: Tests on 🐍 3.12 • cygwin
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - uses: cygwin/cygwin-install-action@v6
      with:
        platform: x86_64
        packages: cmake ninja git make gcc-g++ gcc-fortran python312 python312-devel python312-pip

    - name: Install nox
      run: python3.12 -m pip install nox

    - name: Run tests
      env:
        TMP: /tmp
        TEMP: /tmp
      run: python3.12 -m nox -s tests-3.12 -- --durations=20


  tests-pypy:
    name: Tests on 🐍 PyPy 3.11 • ${{ matrix.runs-on }}
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        runs-on: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - uses: yezz123/setup-uv@v4

    - name: Setup nox
      uses: wntrblm/nox@2026.07.11

    - uses: actions/setup-python@v7
      with:
        python-version: pypy3.11-v7.3.22

    - name: Test on 🐍 PyPy
      run: >
        nox -s tests-pypy3.11 --
        --cov --cov-report=xml --cov-report=term --durations=20
        ${{ matrix.runs-on == 'windows-latest' && '-k "not pep518"' || '' }}

    - name: Upload coverage report
      uses: codecov/codecov-action@v7
      with:
        name: ${{ runner.os }}-pypy3.11
        verbose: true


  sample-projects:
    name: Sample projects on ${{ matrix.runs-on }}
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        runs-on: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/checkout@v6
      with:
        repository: scikit-build/scikit-build-sample-projects
        # Pinned so sample-projects changes can't break this repo's CI; bump deliberately.
        ref: 0ad0bd760a3f2df4d7e21a3c89d5e49353304c32
        path: scikit-build-sample-projects

    - uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Setup nox
      uses: wntrblm/nox@2026.04.10

    - name: Build sample projects
      run: nox -s sample_projects


  dist:
    name: Distribution
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Build SDist and wheel
      run: pipx run build

    - uses: actions/upload-artifact@v7
      with:
        path: dist/*

    - name: Check metadata
      run: pipx run twine check dist/*


  pass:
    if: always()
    timeout-minutes: 1
    needs: [lint, tests, tests-pypy, sample-projects, dist]
    runs-on: ubuntu-slim
    steps:
     - name: Decide whether the needed jobs succeeded or failed
       uses: re-actors/alls-green@release/v1
       with:
         jobs: ${{ toJSON(needs) }}
